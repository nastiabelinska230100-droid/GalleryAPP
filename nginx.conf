server {
    listen 80;
    server_name galleryapp.vps.webdock.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name galleryapp.vps.webdock.cloud;

    # Webdock обычно кладёт SSL сюда — проверь путь командой:
    # ls /etc/letsencrypt/live/ или ls /etc/nginx/ssl/
    ssl_certificate /etc/letsencrypt/live/galleryapp.vps.webdock.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/galleryapp.vps.webdock.cloud/privkey.pem;

    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        alias /opt/gallery/media_storage/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
