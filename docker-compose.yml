version: "3.8"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: gallery
      POSTGRES_PASSWORD: gallery
      POSTGRES_DB: gallery
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://gallery:gallery@db:5432/gallery
      WEBHOOK_URL: ${WEBHOOK_URL}
      MEDIA_DIR: /app/media_storage
      MEDIA_URL_PREFIX: /files
      PORT: "8000"
    volumes:
      - media_storage:/app/media_storage
    ports:
      - "8000:8000"

volumes:
  pgdata:
  media_storage:
